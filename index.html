<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)수영로지콘 - 현장공사일보 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto+Sans+KR', sans-serif; background-color: #f4f7f6; }
        .form-container { max-width: 800px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-logo { color: #004a99; font-weight: bold; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="header-logo">(주)수영로지콘 현장공사일보</div>
        
        <form id="reportForm" class="space-y-4">
            <!-- 기본 정보 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">작성일자</label>
                    <input type="date" id="work_date" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">현장명</label>
                    <input type="text" id="site_name" placeholder="현장명을 입력하세요" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
                </div>
            </div>

            <!-- 공사 내용 -->
            <div>
                <label class="block text-sm font-medium text-gray-700">금일 작업 현황</label>
                <textarea id="work_detail" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="오늘 진행된 주요 공정 내용을 입력하세요"></textarea>
            </div>

            <!-- 인원/장비 현황 -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">출력 인원 (명)</label>
                    <input type="number" id="manpower" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">투입 장비</label>
                    <input type="text" id="equipment" placeholder="예: 포크레인 1대" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                </div>
            </div>

            <!-- 전송 버튼 -->
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                공사일보 전송 및 저장
            </button>
        </form>
    </div>

    <script>
        // Vercel 환경변수에서 값을 읽어옵니다 (자동 연결됨)
        const supabaseUrl = window.location.hostname === 'localhost' ? '' : 'https://' + window.location.hostname.split('.')[0] + '.supabase.co'; 
        // 실제 운영시는 Vercel 환경변수가 우선입니다. 아래는 초기화 예시입니다.
        const SB_URL = "{{NEXT_PUBLIC_SUPABASE_URL}}"; 
        const SB_KEY = "{{NEXT_PUBLIC_SUPABASE_ANON_KEY}}";

        const supabase = supabasejs.createClient(
            location.origin.includes('vercel') ? 'YOUR_ACTUAL_URL_FROM_ENV' : SB_URL, 
            'YOUR_ACTUAL_KEY_FROM_ENV'
        );

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('수영로지콘 시스템에 데이터를 전송합니다...');
            
            // 데이터 수집 로직
            const formData = {
                work_date: document.getElementById('work_date').value,
                site_name: document.getElementById('site_name').value,
                work_detail: document.getElementById('work_detail').value,
                manpower: document.getElementById('manpower').value,
                equipment: document.getElementById('equipment').value
            };

            console.log("전송 데이터:", formData);
            // 실제 Supabase 저장 로직이 여기에 들어갑니다.
        });
        
        // 오늘 날짜 기본 세팅
        document.getElementById('work_date').value = new Date().toISOString().substring(0, 10);
    </script>
</body>
</html>
