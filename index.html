<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)수영로지콘 - 현장공사일보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto+Sans+KR', sans-serif; background-color: #f0f4f8; }
        .form-card { max-width: 700px; margin: 2rem auto; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 class="text-2xl font-bold text-center text-blue-800 mb-8">(주)수영로지콘 현장공사일보</h2>
        
        <form id="reportForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">작성일자</label>
                    <input type="date" id="work_date" class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm border p-2.5" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">현장명</label>
                    <input type="text" id="site_name" placeholder="현장명을 입력하세요" class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm border p-2.5" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">금일 작업 현황 (현장 양식)</label>
                <textarea id="work_detail" rows="8" class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm border p-2.5 text-sm">
[주요 공정]
- 

[인력/장비]
- 인원: 명
- 장비: 

[특이사항/민원]
- 

[내일 계획]
- </textarea>
            </div>

            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3.5 rounded-lg hover:bg-blue-800 shadow-lg transition duration-200">
                공사일보 전송 및 저장
            </button>
        </form>
    </div>

    <script>
        document.getElementById('work_date').value = new Date().toISOString().substring(0, 10);

        document.getElementById('reportForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // 전송 로직 알림
            alert('수영로지콘 시스템에 데이터 저장을 시도합니다.');
            console.log("전송 데이터:", {
                date: document.getElementById('work_date').value,
                site: document.getElementById('site_name').value,
                detail: document.getElementById('work_detail').value
            });
        });
    </script>
</body>
</html>
